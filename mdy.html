```html
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתמלל AO | פרימיום</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Heebo:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ao-cyan: #06b6d4;
            --ao-orange: #f97316;
            --ao-dark: #020617;
        }
        body { 
            font-family: 'Assistant', sans-serif; 
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #f1f5f9;
            min-height: 100vh;
        }
        .ao-glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .ao-gradient-text {
            background: linear-gradient(135deg, var(--ao-cyan), var(--ao-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [result, setResult] = useState(null);
            const [activeTab, setActiveTab] = useState('transcription');
            const [copyLabel, setCopyLabel] = useState('העתק תוכן');

            // מפתח ה-API שלך - וודא שהוא תקין
            const apiKey = "AIzaSyCiOAZ4WMOCnzH5lzka4_2pyiJj5rc6-FA";

            const fileToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = (e) => reject(e);
                });
            };

            const handleCopy = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopyLabel('הועתק! ✓');
                setTimeout(() => setCopyLabel('העתק תוכן'), 2000);
            };

            const processFile = async () => {
                if (!file) return;
                if (!apiKey || apiKey.includes("YOUR")) {
                    alert("שגיאה: מפתח API לא תקין בקוד.");
                    return;
                }

                setIsProcessing(true);
                setResult(null);

                try {
                    const base64Data = await fileToBase64(file);
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "אתה 'מתמלל AO', מומחה תוכן בכיר. נתח את הקובץ המצורף והחזר אך ורק JSON בעברית עם המפתחות: transcription (תמלול מלא ומדויק), summary (סיכום קצר וקולע), actionItems (מערך של משימות), viralHooks (מערך של 3 רעיונות לסרטונים קצרים)." },
                                    { inlineData: { mimeType: file.type, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error.message);

                    let rawText = data.candidates[0].content.parts[0].text;
                    // ניקוי JSON פרימיום
                    const cleanJson = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    const parsed = JSON.parse(cleanJson);
                    setResult(parsed);
                } catch (error) {
                    console.error(error);
                    alert("שגיאה בעיבוד הקובץ. וודא שמפתח ה-API תקין ושהקובץ לא גדול מדי.");
                } finally {
                    setIsProcessing(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-10 min-h-screen flex flex-col">
                    {/* Header Section */}
                    <header className="text-center mb-12">
                        <div className="relative inline-block group animate-float">
                            <div className="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-orange-500 rounded-full blur opacity-50 group-hover:opacity-100 transition duration-1000"></div>
                            <img 
                                src="https://i.ibb.co/pB3Yp5jN/IMG-20260419-WA0041.jpg" 
                                className="relative w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-slate-900 object-cover"
                                alt="AO Productions"
                            />
                        </div>
                        <h1 className="mt-8 text-5xl md:text-6xl font-black tracking-tighter">
                            מתמלל <span className="ao-gradient-text">AO</span>
                        </h1>
                        <p className="text-slate-400 mt-2 text-lg font-light tracking-widest uppercase">Content Architecture System</p>
                    </header>

                    {/* Main Container */}
                    <main className="ao-glass rounded-[3rem] p-6 md:p-12 transition-all duration-500">
                        {!result ? (
                            <div className="text-center">
                                {isProcessing ? (
                                    <div className="py-20 space-y-8">
                                        <div className="relative w-24 h-24 mx-auto">
                                            <div className="absolute inset-0 border-t-4 border-cyan-500 rounded-full animate-spin"></div>
                                            <div className="absolute inset-2 border-b-4 border-orange-500 rounded-full animate-spin-slow"></div>
                                        </div>
                                        <div className="space-y-2">
                                            <h2 className="text-3xl font-bold text-white animate-pulse">AO מעבד את המידע...</h2>
                                            <p className="text-slate-500 italic">אנחנו הופכים קול לזהב דיגיטלי</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="py-10">
                                        <div className="mb-10 p-10 border-2 border-dashed border-slate-800 rounded-3xl hover:border-cyan-500/50 transition-all cursor-pointer bg-slate-900/30 group">
                                            <input 
                                                type="file" 
                                                id="file-input" 
                                                className="hidden" 
                                                accept="audio/*,video/*" 
                                                onChange={(e) => setFile(e.target.files[0])} 
                                            />
                                            <label htmlFor="file-input" className="cursor-pointer block">
                                                <div className="text-6xl mb-6 group-hover:scale-110 transition-transform duration-300">🎙️</div>
                                                <p className="text-2xl font-bold text-slate-200">
                                                    {file ? file.name : "בחר קובץ להעלאה"}
                                                </p>
                                                <p className="text-slate-500 mt-2">אודיו או וידאו - AO יעשה את השאר</p>
                                            </label>
                                        </div>
                                        
                                        {file && (
                                            <button 
                                                onClick={processFile}
                                                className="w-full bg-gradient-to-r from-cyan-600 to-cyan-500 text-slate-950 py-5 rounded-2xl font-black text-2xl shadow-xl hover:shadow-cyan-500/20 hover:scale-[1.01] active:scale-95 transition-all"
                                            >
                                                הפעל ניתוח פרימיום
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                                {/* Tabs */}
                                <div className="flex gap-2 overflow-x-auto pb-4 mb-8 custom-scrollbar justify-start md:justify-center">
                                    {[
                                        { id: 'transcription', label: 'תמלול', icon: '📄' },
                                        { id: 'summary', label: 'סיכום', icon: '💡' },
                                        { id: 'tasks', label: 'משימות', icon: '🎯' },
                                        { id: 'hooks', label: 'ויראלי', icon: '🔥' }
                                    ].map(tab => (
                                        <button 
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`flex-shrink-0 flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${
                                                activeTab === tab.id 
                                                ? 'bg-white text-slate-950 shadow-lg scale-105' 
                                                : 'bg-slate-800/50 text-slate-400 hover:bg-slate-800'
                                            }`}
                                        >
                                            <span>{tab.icon}</span> {tab.label}
                                        </button>
                                    ))}
                                </div>

                                {/* Content Area */}
                                <div className="bg-slate-950/80 rounded-[2rem] p-6 md:p-8 border border-slate-800 min-h-[300px] relative">
                                    <button 
                                        onClick={() => handleCopy(
                                            activeTab === 'transcription' ? result.transcription :
                                            activeTab === 'summary' ? result.summary :
                                            JSON.stringify(activeTab === 'tasks' ? result.actionItems : result.viralHooks)
                                        )}
                                        className="absolute left-6 top-6 bg-slate-800 hover:bg-slate-700 text-xs font-bold px-3 py-2 rounded-lg transition-colors border border-slate-700"
                                    >
                                        {copyLabel}
                                    </button>

                                    <div className="mt-8 text-lg leading-relaxed text-slate-300">
                                        {activeTab === 'transcription' && <p className="whitespace-pre-wrap">{result.transcription}</p>}
                                        {activeTab === 'summary' && <p className="text-xl italic text-cyan-400">"{result.summary}"</p>}
                                        {activeTab === 'tasks' && (
                                            <div className="grid gap-4">
                                                {result.actionItems.map((item, i) => (
                                                    <div key={i} className="flex items-center gap-4 bg-slate-900/50 p-4 rounded-xl border-r-4 border-cyan-500">
                                                        <span className="text-cyan-500 font-black">0{i+1}</span>
                                                        <span>{item}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {activeTab === 'hooks' && (
                                            <div className="grid gap-6">
                                                {result.viralHooks.map((hook, i) => (
                                                    <div key={i} className="bg-gradient-to-br from-orange-500/10 to-transparent p-6 rounded-2xl border border-orange-500/20">
                                                        <p className="text-orange-400 font-black mb-2 italic">Hook #{i+1}</p>
                                                        <p className="text-xl">"{hook}"</p>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <button 
                                    onClick={() => {setResult(null); setFile(null);}}
                                    className="w-full mt-10 text-slate-500 font-bold hover:text-white transition-colors"
                                >
                                    מעלה קובץ חדש ←
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="mt-auto pt-10 text-center text-slate-600 font-bold tracking-[0.3em] text-xs uppercase">
                        AO Productions &copy; 2026 | Tiberias, Israel
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
