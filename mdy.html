<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתמלל AO | פרימיום</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Heebo:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --ao-cyan: #06b6d4; --ao-orange: #f97316; }
        body { font-family: 'Assistant', sans-serif; background: radial-gradient(circle at top right, #0f172a, #020617); color: #f1f5f9; min-height: 100vh; }
        .ao-glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .ao-gradient-text { background: linear-gradient(135deg, var(--ao-cyan), var(--ao-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [result, setResult] = useState(null);
            const [activeTab, setActiveTab] = useState('transcription');
            const apiKey = "AIzaSyDdeH_8iw6aOm7hMvbUfohTSABR4GdVGfY";

            const fileToBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });

            const processFile = async () => {
                if (!file) return;
                setIsProcessing(true);
                setResult(null);
                try {
                    const base64Data = await fileToBase64(file);
                    // חזרנו ל-v1beta כי v1 לא תומך בקבצים במודל הזה
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "אתה 'מתמלל AO'. נתח את הקובץ והחזר JSON בעברית: transcription, summary, actionItems (array), viralHooks (array)." },
                                    { inlineData: { mimeType: file.type, data: base64Data } }
                                ]
                            }]
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    let rawText = data.candidates[0].content.parts[0].text;
                    const cleanJson = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    setResult(JSON.parse(cleanJson));
                } catch (error) {
                    alert("AO אומר: " + error.message);
                } finally { setIsProcessing(false); }
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-10">
                    <header className="text-center mb-12 animate-float">
                        <h1 className="text-6xl font-black italic">מתמלל <span className="ao-gradient-text">AO</span></h1>
                        <p className="text-slate-400 mt-2 tracking-widest uppercase">Content Architecture System</p>
                    </header>
                    <main className="ao-glass rounded-[3rem] p-12 transition-all">
                        {!result ? (
                            <div className="text-center">
                                {isProcessing ? (
                                    <div className="py-20 animate-pulse text-3xl font-bold">AO מעבד את המידע...</div>
                                ) : (
                                    <div className="py-10">
                                        <input type="file" id="file-input" className="hidden" onChange={(e) => setFile(e.target.files[0])} />
                                        <label htmlFor="file-input" className="cursor-pointer block p-10 border-2 border-dashed border-slate-800 rounded-3xl hover:border-cyan-500 transition-all">
                                            <div className="text-6xl mb-4">🎙️</div>
                                            <p className="text-2xl font-bold">{file ? file.name : "בחר קובץ להעלאה"}</p>
                                        </label>
                                        {file && <button onClick={processFile} className="w-full mt-8 bg-cyan-600 text-white py-5 rounded-2xl font-black text-2xl hover:scale-105 transition-all">הפעל ניתוח פרימיום</button>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div>
                                <div className="flex gap-2 justify-center mb-8">
                                    {['transcription', 'summary', 'tasks', 'hooks'].map(tab => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-3 rounded-xl font-bold ${activeTab === tab ? 'bg-white text-black' : 'bg-slate-800'}`}>{tab}</button>
                                    ))}
                                </div>
                                <div className="bg-slate-950 p-8 rounded-2xl min-h-[200px] whitespace-pre-wrap">
                                    {activeTab === 'transcription' && result.transcription}
                                    {activeTab === 'summary' && result.summary}
                                    {activeTab === 'tasks' && result.actionItems.join('\n')}
                                    {activeTab === 'hooks' && result.viralHooks.join('\n')}
                                </div>
                                <button onClick={() => {setResult(null); setFile(null);}} className="w-full mt-8 text-slate-500 underline">קובץ חדש</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
