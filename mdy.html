<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>התקציב המשפחתי - ריקי ואהרל'ה</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;800&display=swap');
        body { 
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        
        /* אנימציות פרימיום */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .animate-slide-up { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-pulse-glow { animation: pulseGlow 4s ease-in-out infinite; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // הגדרות FIREBASE המעודכנות שלך
        const firebaseConfig = {
            apiKey: "AIzaSyBqpLOIbztpurGuUqpfaWZT71JcofKG2rc",
            authDomain: "riki-aharele-budget.firebaseapp.com",
            projectId: "riki-aharele-budget",
            storageBucket: "riki-aharele-budget.firebasestorage.app",
            messagingSenderId: "53506652532",
            appId: "1:53506652532:web:28b3e3fc28114b1feb9421"
        };

        // אתחול
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        db.enablePersistence().catch(() => console.log("Offline mode active"));

        const appId = 'riki-aharele-budget';

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [incomes, setIncomes] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [fixedExpenses, setFixedExpenses] = useState([]);
            const [fixedIncomes, setFixedIncomes] = useState([]);
            const [view, setView] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalType, setModalType] = useState('income');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (!currentUser) auth.signInAnonymously();
                    setUser(currentUser);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const unsub1 = baseRef.collection('incomes').onSnapshot(s => setIncomes(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsub2 = baseRef.collection('expenses').onSnapshot(s => setExpenses(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsub3 = baseRef.collection('fixed_settings').onSnapshot(s => setFixedExpenses(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsub4 = baseRef.collection('fixed_incomes').onSnapshot(s => setFixedIncomes(s.docs.map(d => ({id: d.id, ...d.data()}))));
                return () => { unsub1(); unsub2(); unsub3(); unsub4(); };
            }, [user]);

            const cycleData = useMemo(() => {
                const now = new Date();
                let startDate = new Date(now.getFullYear(), now.getMonth(), 15);
                if (now.getDate() < 15) startDate.setMonth(startDate.getMonth() - 1);

                const curVarInc = incomes.filter(i => new Date(i.date) >= startDate);
                const curVarExp = expenses.filter(i => new Date(i.date) >= startDate);

                const totalInc = curVarInc.reduce((s, i) => s + Number(i.amount || 0), 0) + fixedIncomes.reduce((s, i) => s + Number(i.amount || 0), 0);
                const totalFixedExp = fixedExpenses.reduce((s, i) => s + Number(i.amount || 0), 0);
                const totalVarExp = curVarExp.reduce((s, i) => s + Number(i.amount || 0), 0);

                return { totalIncome: totalInc, totalFixedExp, totalVarExp, balance: totalInc - totalFixedExp - totalVarExp, filteredIncomes: curVarInc, filteredExpenses: curVarExp };
            }, [incomes, expenses, fixedExpenses, fixedIncomes]);

            const handleAddItem = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const col = modalType === 'income' ? 'incomes' : 'expenses';
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).add({
                    amount: Number(formData.get('amount')),
                    description: formData.get('description'),
                    date: new Date().toISOString()
                });
                setIsModalOpen(false);
            };

            const handleAddFixed = async (e, type) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const col = type === 'income' ? 'fixed_incomes' : 'fixed_settings';
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).add({
                    name: formData.get('name'),
                    amount: Number(formData.get('amount'))
                });
                e.target.reset();
            };

            const deleteItem = async (col, id) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).doc(id).delete();
            };

            if (loading) return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-emerald-500 font-bold">טוען יוקרה...</div>;

            return (
                <div className="min-h-screen pb-32">
                    <div className="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
                        <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-emerald-600/10 rounded-full blur-[100px] animate-pulse-glow"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-rose-600/10 rounded-full blur-[120px] animate-pulse-glow"></div>
                    </div>

                    <header className="pt-12 pb-8 px-6 animate-slide-up">
                        <div className="flex justify-between items-center mb-8 animate-float">
                            <div>
                                <h1 className="text-3xl font-black text-white">שלום, ריקי ואהרל'ה</h1>
                                <p className="text-slate-400 text-sm font-bold">התקציב המשפחתי</p>
                            </div>
                            <div className="bg-emerald-500 p-3 rounded-2xl shadow-lg shadow-emerald-500/20"><Icon name="wallet" className="text-slate-900" /></div>
                        </div>

                        <div className="glass-panel p-8 rounded-[2.5rem] text-center shadow-2xl">
                            <span className="text-slate-400 text-[10px] uppercase font-bold tracking-widest block mb-2">יתרה למחזור (מה-15 לחודש)</span>
                            <h2 className={`text-6xl font-black ${cycleData.balance >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                ₪{cycleData.balance.toLocaleString()}
                            </h2>
                        </div>
                    </header>

                    <main className="px-6 space-y-8 animate-slide-up" style={{animationDelay: '0.2s'}}>
                        {view === 'dashboard' ? (
                            <>
                                <section className="grid grid-cols-2 gap-4">
                                    <button onClick={() => { setModalType('income'); setIsModalOpen(true); }} className="flex flex-col items-center p-6 bg-emerald-500/10 border border-emerald-500/20 rounded-[2rem] active:scale-95 transition-all">
                                        <Icon name="plus-circle" className="text-emerald-400 mb-2" size={32} />
                                        <span className="text-emerald-400 font-bold text-sm">הכנסה חדשה</span>
                                    </button>
                                    <button onClick={() => { setModalType('expense'); setIsModalOpen(true); }} className="flex flex-col items-center p-6 bg-rose-500/10 border border-rose-500/20 rounded-[2rem] active:scale-95 transition-all">
                                        <Icon name="minus-circle" className="text-rose-400 mb-2" size={32} />
                                        <span className="text-rose-400 font-bold text-sm">הוצאה חדשה</span>
                                    </button>
                                </section>

                                <section>
                                    <h3 className="font-black text-xl mb-4 px-2 italic">תנועות אחרונות</h3>
                                    <div className="space-y-3">
                                        {[...cycleData.filteredIncomes, ...cycleData.filteredExpenses].sort((a,b) => new Date(b.date) - new Date(a.date)).map(item => {
                                            const isInc = incomes.some(i => i.id === item.id);
                                            return (
                                                <div key={item.id} className="glass-panel p-4 rounded-3xl flex justify-between items-center">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`p-3 rounded-2xl ${isInc ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}`}>
                                                            <Icon name={isInc ? "trending-up" : "shopping-bag"} size={20} />
                                                        </div>
                                                        <div><p className="font-bold text-sm">{item.description}</p><p className="text-[10px] text-slate-500">{new Date(item.date).toLocaleDateString('he-IL')}</p></div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <span className={`font-black text-lg ${isInc ? 'text-emerald-400' : 'text-rose-400'}`}>{isInc ? '+' : '-'}₪{item.amount}</span>
                                                        <button onClick={() => deleteItem(isInc ? 'incomes' : 'expenses', item.id)} className="text-slate-600 hover:text-rose-500"><Icon name="trash-2" size={16} /></button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            </>
                        ) : (
                            <section className="space-y-10">
                                <div>
                                    <h3 className="font-black text-xl text-emerald-400 mb-4 text-center">הכנסות קבועות</h3>
                                    <form onSubmit={(e) => handleAddFixed(e, 'income')} className="glass-panel p-6 rounded-[2rem] space-y-4">
                                        <input name="name" required className="w-full p-4 bg-slate-900/50 rounded-xl outline-none border border-white/5 focus:border-emerald-500 transition-all font-bold" placeholder="מקור (למשל: משכורת)" />
                                        <input name="amount" type="number" required className="w-full p-4 bg-slate-900/50 rounded-xl outline-none border border-white/5 focus:border-emerald-500 transition-all font-bold" placeholder="סכום קבוע" />
                                        <button type="submit" className="w-full bg-emerald-500 text-slate-900 p-4 rounded-xl font-black active:scale-95 transition-all">הוסף הכנסה קבועה</button>
                                    </form>
                                    <div className="mt-4 space-y-2">{fixedIncomes.map(item => (
                                        <div key={item.id} className="glass-panel p-4 rounded-2xl flex justify-between items-center"><p className="font-bold text-emerald-400">{item.name}</p><div className="flex items-center gap-4"><span className="font-black">₪{item.amount}</span><button onClick={() => deleteItem('fixed_incomes', item.id)} className="text-rose-500"><Icon name="trash-2" size={18}/></button></div></div>
                                    ))}</div>
                                </div>

                                <div>
                                    <h3 className="font-black text-xl text-rose-400 mb-4 text-center">הוצאות קבועות</h3>
                                    <form onSubmit={(e) => handleAddFixed(e, 'expense')} className="glass-panel p-6 rounded-[2rem] space-y-4">
                                        <input name="name" required className="w-full p-4 bg-slate-900/50 rounded-xl outline-none border border-white/5 focus:border-rose-500 transition-all font-bold" placeholder="שם ההוצאה (למשל: שכירות)" />
                                        <input name="amount" type="number" required className="w-full p-4 bg-slate-900/50 rounded-xl outline-none border border-white/5 focus:border-rose-500 transition-all font-bold" placeholder="סכום קבוע" />
                                        <button type="submit" className="w-full bg-rose-500 text-white p-4 rounded-xl font-black active:scale-95 transition-all">הוסף הוצאה קבועה</button>
                                    </form>
                                    <div className="mt-4 space-y-2">{fixedExpenses.map(item => (
                                        <div key={item.id} className="glass-panel p-4 rounded-2xl flex justify-between items-center"><p className="font-bold text-slate-300">{item.name}</p><div className="flex items-center gap-4"><span className="font-black">₪{item.amount}</span><button onClick={() => deleteItem('fixed_settings', item.id)} className="text-rose-500"><Icon name="trash-2" size={18}/></button></div></div>
                                    ))}</div>
                                </div>
                            </section>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 glass-panel p-5 flex justify-around rounded-[2.5rem] z-40">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center ${view === 'dashboard' ? 'text-emerald-400 scale-110' : 'text-slate-500'} transition-all`}><Icon name="layout-dashboard" /><span className="text-[10px] font-bold mt-1">ראשי</span></button>
                        <button onClick={() => setView('settings')} className={`flex flex-col items-center ${view === 'settings' ? 'text-emerald-400 scale-110' : 'text-slate-500'} transition-all`}><Icon name="settings" /><span className="text-[10px] font-bold mt-1">הגדרות</span></button>
                    </nav>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center">
                            <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-slate-900 rounded-t-[3rem] p-8 animate-slide-up border-t border-white/10">
                                <h3 className="text-2xl font-black text-center mb-8">{modalType === 'income' ? 'הכנסה חדשה 💰' : 'הוצאה חדשה 💸'}</h3>
                                <form onSubmit={handleAddItem} className="space-y-6">
                                    <input name="amount" type="number" required autoFocus className="w-full text-5xl font-black text-center py-6 bg-slate-950 rounded-[2rem] outline-none border border-white/5 focus:border-emerald-500 transition-all" placeholder="0" />
                                    <input name="description" required className="w-full p-5 bg-slate-950 rounded-2xl outline-none border border-white/5 focus:border-emerald-500 transition-all font-bold" placeholder="עבור מה?" />
                                    <button type="submit" className={`w-full p-6 rounded-2xl font-black text-xl shadow-2xl ${modalType === 'income' ? 'bg-emerald-500 text-slate-950' : 'bg-rose-500 text-white'}`}>אישור ושמירה</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
