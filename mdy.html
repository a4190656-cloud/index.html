<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתמלל AO | פרימיום</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #020617; color: #f1f5f9; }
        .ao-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .ao-gradient { background: linear-gradient(135deg, #06b6d4, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [result, setResult] = useState(null);
            const [activeTab, setActiveTab] = useState('transcription');
            
            // המפתח שלך - וודא שהוא מועתק בלי רווחים
            const apiKey = "AIzaSyDdeH_8iw6aOm7hMvbUfohTSABR4GdVGfY";

            const fileToBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });

            const processFile = async () => {
                if (!file) return;
                setIsProcessing(true);
                setResult(null);

                try {
                    const base64Data = await fileToBase64(file);
                    // ניסיון עם השם הכי מעודכן: gemini-1.5-flash-latest
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "אתה 'מתמלל AO'. נתח את הקובץ והחזר JSON בעברית עם המפתחות: transcription, summary, actionItems, viralHooks." },
                                    { inlineData: { mimeType: file.type, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const rawText = data.candidates[0].content.parts[0].text;
                    const cleanJson = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    setResult(JSON.parse(cleanJson));
                } catch (error) {
                    alert("AO אומר: " + error.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-20 text-center">
                    <h1 className="text-6xl font-black mb-10">מתמלל <span className="ao-gradient">AO</span></h1>
                    
                    <main className="ao-glass rounded-[2rem] p-10 shadow-2xl">
                        {!result ? (
                            <div>
                                {isProcessing ? (
                                    <div className="py-10 text-2xl animate-pulse font-bold text-cyan-400">מעבד מידע בפרימיום...</div>
                                ) : (
                                    <div className="space-y-6">
                                        <label className="block p-10 border-2 border-dashed border-slate-700 rounded-2xl cursor-pointer hover:border-orange-500 transition-colors">
                                            <input type="file" className="hidden" onChange={(e) => setFile(e.target.files[0])} />
                                            <span className="text-xl">{file ? file.name : "לחץ לבחירת קובץ"}</span>
                                        </label>
                                        {file && <button onClick={processFile} className="w-full bg-cyan-600 py-4 rounded-xl font-bold text-xl">הפעל AO</button>}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="text-right">
                                <div className="flex gap-4 mb-6">
                                    {['transcription', 'summary', 'actionItems', 'viralHooks'].map(t => (
                                        <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 rounded-lg ${activeTab === t ? 'bg-orange-500' : 'bg-slate-800'}`}>{t}</button>
                                    ))}
                                </div>
                                <div className="bg-slate-900 p-6 rounded-xl whitespace-pre-wrap min-h-[200px]">
                                    {Array.isArray(result[activeTab]) ? result[activeTab].map((item, i) => <div key={i} className="mb-2">• {item}</div>) : result[activeTab]}
                                </div>
                                <button onClick={() => {setResult(null); setFile(null);}} className="mt-6 text-slate-500 underline w-full text-center">קובץ חדש</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
