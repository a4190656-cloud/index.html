<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתמלל AO - מערכת תמלול חכמה</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', 'Heebo', sans-serif; background-color: #05070a; color: #e2e8f0; }
        .animate-spin-slow { animation: spin 12s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [file, setFile] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [result, setResult] = useState(null);
            const [activeTab, setActiveTab] = useState('transcription');
            
            // הכנס את מפתח ה-API שלך כאן
            const apiKey = "AIzaSyDdeH_8iw6aOm7hMvbUfohTSABR4GdVGfY";
            const fileToBase64 = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = (error) => reject(error);
                });
            };

            const processFile = async () => {
                if (!file || !apiKey || apiKey === "YOUR_API_KEY_HERE") {
                    alert("אנא וודא שנבחר קובץ ושהזנת מפתח API תקין בקוד.");
                    return;
                }
                
                setIsProcessing(true);
                setResult(null);

                try {
                    const base64Data = await fileToBase64(file);
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "אתה 'מתמלל AO', ארכיטקט תוכן ברמה גבוהה. נתח את הקובץ המצורף והחזר תשובה בפורמט JSON בלבד בעברית עם המפתחות הבאים: transcription (תמלול מלא), summary (סיכום המפגש), actionItems (מערך של משימות לביצוע), ו-viralHooks (מערך של רעיונות לסרטונים ויראליים)." },
                                    { inlineData: { mimeType: file.type, data: base64Data } }
                                ]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        const aiResponse = JSON.parse(data.candidates[0].content.parts[0].text);
                        setResult(aiResponse);
                    } else {
                        throw new Error("תגובה לא תקינה מה-API");
                    }
                } catch (error) {
                    console.error("Error:", error);
                    alert("שגיאה בעיבוד: " + error.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <header className="mb-10 text-center animate-fade-in">
                        <div className="relative inline-block mb-6">
                            <div className="absolute -inset-1 bg-gradient-to-tr from-cyan-500 to-orange-500 rounded-full blur opacity-40 animate-spin-slow"></div>
                            <img src="https://i.ibb.co/pB3Yp5jN/IMG-20260419-WA0041.jpg" className="relative w-28 h-28 md:w-36 md:h-36 rounded-full border-4 border-slate-900 object-cover shadow-2xl" alt="AO Logo" />
                        </div>
                        <h1 className="text-4xl md:text-5xl font-black text-white tracking-tight">מתמלל <span className="text-cyan-500">AO</span></h1>
                        <p className="text-slate-400 mt-3 font-medium">הופכים קול לנכסים דיגיטליים חכמים</p>
                    </header>

                    <main className="w-full max-w-3xl glass rounded-[2.5rem] p-6 md:p-10 shadow-2xl transition-all">
                        {!result ? (
                            <div className="text-center py-10">
                                {isProcessing ? (
                                    <div className="space-y-6">
                                        <div className="animate-spin inline-block w-16 h-16 border-[6px] border-cyan-500/20 border-t-cyan-500 rounded-full"></div>
                                        <h2 className="text-2xl font-bold text-white animate-pulse">AO מעבד את הקובץ שלך...</h2>
                                        <p className="text-slate-500 text-sm">זה לוקח כמה שניות, אנחנו מנתחים הכל</p>
                                    </div>
                                ) : (
                                    <div className="space-y-8">
                                        <div className="border-2 border-dashed border-slate-700 rounded-3xl p-10 hover:border-cyan-500/50 transition-colors group">
                                            <input type="file" id="file-upload" className="hidden" onChange={(e) => setFile(e.target.files[0])} accept="audio/*,video/*" />
                                            <label htmlFor="file-upload" className="cursor-pointer block">
                                                <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">📁</div>
                                                <span className="text-xl font-bold text-slate-300 block mb-2">{file ? file.name : "גרור או בחר קובץ אודיו/וידאו"}</span>
                                                <span className="text-slate-500 text-sm italic">AO ינתח את התוכן עבורך</span>
                                            </label>
                                        </div>
                                        {file && (
                                            <button onClick={processFile} className="w-full bg-gradient-to-r from-cyan-600 to-cyan-500 text-slate-950 py-5 rounded-2xl font-black text-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:scale-[1.02] active:scale-95 transition-all">
                                                הפעל ניתוח AO חכם
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-6 animate-fade-in text-right">
                                <div className="flex gap-2 overflow-x-auto pb-2 custom-scrollbar">
                                    {[
                                        { id: 'transcription', label: 'תמלול', icon: '📝' },
                                        { id: 'summary', label: 'סיכום', icon: '📋' },
                                        { id: 'tasks', label: 'משימות', icon: '✅' },
                                        { id: 'hooks', label: 'ויראלי', icon: '🚀' }
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-shrink-0 flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${activeTab === tab.id ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' : 'bg-slate-800/50 text-slate-400 hover:bg-slate-800'}`}>
                                            <span>{tab.icon}</span> {tab.label}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="bg-slate-950/50 p-6 rounded-3xl border border-slate-800 min-h-[300px] leading-relaxed">
                                    {activeTab === 'transcription' && <div className="whitespace-pre-wrap text-slate-300">{result.transcription}</div>}
                                    {activeTab === 'summary' && <div className="text-slate-300 text-lg">{result.summary}</div>}
                                    {activeTab === 'tasks' && (
                                        <ul className="space-y-3">
                                            {result.actionItems.map((item, i) => <li key={i} className="flex items-start gap-3 bg-slate-800/30 p-3 rounded-lg border border-slate-800/50"><span className="text-cyan-500 font-bold">✓</span> {item}</li>)}
                                        </ul>
                                    )}
                                    {activeTab === 'hooks' && (
                                        <div className="grid gap-4">
                                            {result.viralHooks.map((hook, i) => <div key={i} className="bg-gradient-to-l from-orange-500/10 to-transparent p-4 rounded-xl border-r-4 border-orange-500 italic">"{hook}"</div>)}
                                        </div>
                                    )}
                                </div>
                                
                                <button onClick={() => {setResult(null); setFile(null);}} className="w-full py-4 text-slate-500 font-bold hover:text-white transition-colors border-t border-slate-800 mt-4">
                                    מעלה קובץ חדש →
                                </button>
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-auto py-8 text-slate-600 text-sm font-bold uppercase tracking-widest">
                        Developed by AO Productions &copy; 2026
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
