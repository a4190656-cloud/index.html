<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התקציב המשפחתי - ריקי ואהרל'ה</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- הגדרות FIREBASE ---
        // כאן אתה צריך להדביק את ה-Config שקיבלת מהחשבון שלך ב-Firebase
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // אתחול Firebase (גרסת Compat למניעת בעיות ייבוא)
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'riki-aharele-budget';

        // רכיב אייקון עזר
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [incomes, setIncomes] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [fixedExpenses, setFixedExpenses] = useState([]);
            const [view, setView] = useState('dashboard');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalType, setModalType] = useState('income');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (!currentUser) {
                        auth.signInAnonymously();
                    }
                    setUser(currentUser);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const baseRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubIncomes = baseRef.collection('incomes').onSnapshot(snap => 
                    setIncomes(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))
                );
                const unsubExpenses = baseRef.collection('expenses').onSnapshot(snap => 
                    setExpenses(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))
                );
                const unsubFixed = baseRef.collection('fixed_settings').onSnapshot(snap => 
                    setFixedExpenses(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })))
                );

                return () => { unsubIncomes(); unsubExpenses(); unsubFixed(); };
            }, [user]);

            const totals = useMemo(() => {
                const totalIncome = incomes.reduce((sum, item) => sum + Number(item.amount || 0), 0);
                const totalFixed = fixedExpenses.reduce((sum, item) => sum + Number(item.amount || 0), 0);
                const totalVariable = expenses.reduce((sum, item) => sum + Number(item.amount || 0), 0);
                return { totalIncome, totalFixed, totalVariable, balance: totalIncome - totalFixed - totalVariable };
            }, [incomes, expenses, fixedExpenses]);

            const handleAddItem = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const col = modalType === 'income' ? 'incomes' : 'expenses';
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).add({
                    amount: Number(formData.get('amount')),
                    description: formData.get('description'),
                    date: new Date().toISOString(),
                    createdBy: user.uid
                });
                setIsModalOpen(false);
            };

            const handleAddFixed = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('fixed_settings').add({
                    name: formData.get('name'),
                    amount: Number(formData.get('amount'))
                });
                e.target.reset();
            };

            const deleteItem = async (col, id) => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(col).doc(id).delete();
            };

            if (loading) return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center">
                    <div className="text-emerald-400 animate-pulse text-xl font-light">טוען את התקציב של ריקי ואהרל'ה...</div>
                </div>
            );

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-6 rounded-b-[2.5rem] shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                        <div className="relative z-10">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h1 className="text-sm font-medium text-slate-400">שלום, ריקי ואהרל'ה</h1>
                                    <p className="text-xl font-bold tracking-tight">התקציב המשפחתי</p>
                                </div>
                                <div className="bg-white/10 p-2 rounded-full backdrop-blur-md">
                                    <Icon name="wallet" className="text-emerald-400" />
                                </div>
                            </div>
                            <div className="text-center py-4">
                                <span className="text-slate-400 text-xs block mb-1">יתרה פנויה לניצול</span>
                                <h2 className={`text-5xl font-black ${totals.balance >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    ₪{totals.balance.toLocaleString()}
                                </h2>
                            </div>
                            <div className="grid grid-cols-3 gap-4 mt-8">
                                <div className="bg-white/5 backdrop-blur-sm p-3 rounded-2xl border border-white/10 text-center">
                                    <span className="text-[10px] text-slate-400 block">הכנסות</span>
                                    <span className="text-sm font-bold text-emerald-400">₪{totals.totalIncome.toLocaleString()}</span>
                                </div>
                                <div className="bg-white/5 backdrop-blur-sm p-3 rounded-2xl border border-white/10 text-center">
                                    <span className="text-[10px] text-slate-400 block">קבועות</span>
                                    <span className="text-sm font-bold text-slate-200">₪{totals.totalFixed.toLocaleString()}</span>
                                </div>
                                <div className="bg-white/5 backdrop-blur-sm p-3 rounded-2xl border border-white/10 text-center">
                                    <span className="text-[10px] text-slate-400 block">משתנות</span>
                                    <span className="text-sm font-bold text-rose-400">₪{totals.totalVariable.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="px-6 mt-8 space-y-6">
                        {view === 'dashboard' ? (
                            <>
                                <section className="grid grid-cols-2 gap-4">
                                    <button onClick={() => { setModalType('income'); setIsModalOpen(true); }} className="flex flex-col items-center p-6 bg-emerald-50 rounded-[2rem] border border-emerald-100 active:scale-95 transition-all">
                                        <Icon name="arrow-up-circle" size={32} className="text-emerald-600 mb-2" />
                                        <span className="text-emerald-900 font-bold">הכנסה</span>
                                    </button>
                                    <button onClick={() => { setModalType('expense'); setIsModalOpen(true); }} className="flex flex-col items-center p-6 bg-rose-50 rounded-[2rem] border border-rose-100 active:scale-95 transition-all">
                                        <Icon name="arrow-down-circle" size={32} className="text-rose-600 mb-2" />
                                        <span className="text-rose-900 font-bold">הוצאה</span>
                                    </button>
                                </section>

                                <section>
                                    <h3 className="font-bold text-lg text-slate-800 mb-4">תנועות אחרונות</h3>
                                    <div className="space-y-3">
                                        {[...incomes, ...expenses].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,10).map(item => (
                                            <div key={item.id} className="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-slate-100">
                                                <div className="flex items-center gap-3">
                                                    <div className={`p-2 rounded-xl ${incomes.some(i => i.id === item.id) ? 'bg-emerald-100' : 'bg-rose-100'}`}>
                                                        <Icon name={incomes.some(i => i.id === item.id) ? "trending-up" : "credit-card"} size={18} className={incomes.some(i => i.id === item.id) ? "text-emerald-600" : "text-rose-600"} />
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-sm text-slate-800">{item.description}</p>
                                                        <p className="text-[10px] text-slate-400">{new Date(item.date).toLocaleDateString('he-IL')}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className={`font-bold ${incomes.some(i => i.id === item.id) ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                        {incomes.some(i => i.id === item.id) ? '+' : '-'}₪{item.amount}
                                                    </span>
                                                    <button onClick={() => deleteItem(incomes.some(i => i.id === item.id) ? 'incomes' : 'expenses', item.id)} className="text-slate-300 hover:text-rose-500">
                                                        <Icon name="trash-2" size={16} />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </>
                        ) : (
                            <section className="animate-in fade-in slide-in-from-bottom-4">
                                <h3 className="font-bold text-lg text-slate-800 mb-4 text-center">ניהול הוצאות קבועות</h3>
                                <form onSubmit={handleAddFixed} className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-6 space-y-4">
                                    <input name="name" required className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-slate-900" placeholder="שם ההוצאה (למשל: משכנתא)" />
                                    <input name="amount" type="number" required className="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-slate-900" placeholder="סכום חודשי" />
                                    <button type="submit" className="w-full bg-slate-900 text-white p-3 rounded-xl font-bold active:scale-95 transition-all">הוסף הוצאה קבועה</button>
                                </form>
                                <div className="space-y-3">
                                    {fixedExpenses.map(item => (
                                        <div key={item.id} className="bg-slate-100 p-4 rounded-2xl flex justify-between items-center">
                                            <div><p className="font-bold text-slate-800">{item.name}</p><p className="text-xs text-slate-500 italic">יורד אוטומטית</p></div>
                                            <div className="flex items-center gap-4"><span className="font-bold">₪{item.amount}</span>
                                            <button onClick={() => deleteItem('fixed_settings', item.id)} className="text-rose-400"><Icon name="trash-2" size={18}/></button></div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 px-12 py-4 flex justify-between items-center shadow-2xl rounded-t-[2rem]">
                        <button onClick={() => setView('dashboard')} className={`flex flex-col items-center ${view === 'dashboard' ? 'text-slate-900' : 'text-slate-300'}`}>
                            <Icon name="layout-dashboard" />
                            <span className="text-[10px] mt-1 font-bold">ראשי</span>
                        </button>
                        <button onClick={() => setView('settings')} className={`flex flex-col items-center ${view === 'settings' ? 'text-slate-900' : 'text-slate-300'}`}>
                            <Icon name="settings" />
                            <span className="text-[10px] mt-1 font-bold">הגדרות</span>
                        </button>
                    </nav>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white rounded-t-[3rem] p-8 shadow-2xl animate-in slide-in-from-bottom-full duration-300">
                                <h3 className="text-xl font-black text-center mb-6">{modalType === 'income' ? 'הוספת הכנסה 💰' : 'הוספת הוצאה 💸'}</h3>
                                <form onSubmit={handleAddItem} className="space-y-6">
                                    <input name="amount" type="number" required className="w-full text-3xl font-black text-center p-4 bg-slate-50 rounded-3xl outline-none focus:ring-2 focus:ring-slate-900" placeholder="0" />
                                    <input name="description" required className="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-slate-900" placeholder="תיאור..." />
                                    <button type="submit" className={`w-full p-5 rounded-2xl text-white font-bold text-lg ${modalType === 'income' ? 'bg-emerald-500 shadow-emerald-500/30' : 'bg-rose-500 shadow-rose-500/30'}`}>אישור ושמירה</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
